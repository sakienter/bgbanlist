name: Update labels and intro
on:
  push:
    paths:
      - scripts/update_anomaly_labels_and_intro.py
      - .github/workflows/update-labels-and-intro.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/update_anomaly_labels_and_intro.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Update anomaly labels, Treasure Hoard text, and intro"
          git push
