name: Localize target names

on:
  push:
    paths:
      - scripts/localize_targets.py
      - .github/workflows/localize-targets.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  localize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/localize_targets.py
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md unresolved-targets.txt
          git commit -m "Localize target names"
          git push
