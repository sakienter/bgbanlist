name: Rename Kaboom Bot portrait
on:
  push:
    paths:
      - scripts/rename_kaboom_bot_portrait.py
      - .github/workflows/rename-kaboom-bot-portrait.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/rename_kaboom_bot_portrait.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html Trinkets.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Rename Kaboom Bot portrait in Japanese"
          git push
