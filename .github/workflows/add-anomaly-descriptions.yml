name: Add anomaly descriptions

on:
  push:
    paths:
      - scripts/add_anomaly_descriptions.py
      - .github/workflows/add-anomaly-descriptions.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/add_anomaly_descriptions.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html unresolved-anomaly-descriptions.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Show anomaly descriptions below titles"
          git push
