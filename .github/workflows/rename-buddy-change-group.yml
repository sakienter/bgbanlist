name: Rename buddy change group
on:
  push:
    paths:
      - scripts/rename_buddy_change_group.py
      - .github/workflows/rename-buddy-change-group.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/rename_buddy_change_group.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Rename buddy content change group"
          git push
