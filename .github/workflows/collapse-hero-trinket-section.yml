name: Collapse hero trinket section
on:
  push:
    paths:
      - scripts/collapse_hero_trinket_section.py
      - .github/workflows/collapse-hero-trinket-section.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/collapse_hero_trinket_section.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Collapse hero-specific trinket section"
          git push
