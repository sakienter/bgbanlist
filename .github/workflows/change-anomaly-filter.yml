name: Change anomaly filter

on:
  push:
    paths:
      - scripts/change_anomaly_filter.py
      - .github/workflows/change-anomaly-filter.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/change_anomaly_filter.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Replace status filters with anomaly selector"
          git push
