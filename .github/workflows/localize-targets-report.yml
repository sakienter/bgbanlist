name: Generate target localization report

on:
  push:
    paths:
      - .github/workflows/localize-targets-report.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/localize_targets.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md unresolved-targets.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Update localized target names and unresolved report"
          git push
