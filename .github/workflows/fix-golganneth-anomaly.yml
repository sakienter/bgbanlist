name: Fix Golganneth anomaly classification

on:
  push:
    paths:
      - scripts/fix_golganneth_anomaly.py
      - .github/workflows/fix-golganneth-anomaly.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/fix_golganneth_anomaly.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Merge Galakrond rows into Golganneth's Tempest"
          git push
