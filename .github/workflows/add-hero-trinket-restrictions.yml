name: Add hero trinket restrictions
on:
  push:
    paths:
      - scripts/add_hero_trinket_restrictions.py
      - .github/workflows/add-hero-trinket-restrictions.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/add_hero_trinket_restrictions.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html Trinkets.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add hero-specific trinket restrictions"
          git push
